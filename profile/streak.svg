<svg xmlns='http://www.w3.org/2000/svg' xmlns:xlink='http://www.w3.org/1999/xlink'
                style='isolation: isolate' viewBox='0 0 817 195' width='817px' height='195px' direction='ltr'>
        
        <defs>
            <clipPath id='outer_rectangle'>
                <rect width='817' height='195' rx='4.5'/>
            </clipPath>
            <mask id='mask_out_ring_behind_fire'>
                <rect width='817' height='195' fill='white'/>
                <ellipse id='mask-ellipse' cx='408.5' cy='32' rx='13' ry='18' fill='black'/>
            </mask>
            
        </defs>
        <g clip-path='url(#outer_rectangle)'>
            <g style='isolation: isolate'>
                <rect stroke='#000000' stroke-opacity='0' fill='#000000' fill-opacity='0' rx='4.5' x='0.5' y='0.5' width='816' height='194'/>
            </g>
            <g style='isolation: isolate'>
                <line x1='272.33333333333' y1='28' x2='272.33333333333' y2='170' vector-effect='non-scaling-stroke' stroke-width='1' stroke='#9d4edd' stroke-linejoin='miter' stroke-linecap='square' stroke-miterlimit='3'/>
                <line x1='544.66666666667' y1='28' x2='544.66666666667' y2='170' vector-effect='non-scaling-stroke' stroke-width='1' stroke='#9d4edd' stroke-linejoin='miter' stroke-linecap='square' stroke-miterlimit='3'/>
            </g>
            <g style='isolation: isolate'>
                <!-- Total Contributions big number -->
                <g transform='translate(136.16666666667, 48)'>
                    <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#ff1493' stroke='none' font-family='"Segoe UI", Ubuntu, sans-serif' font-weight='700' font-size='28px' font-style='normal' style='opacity: 1; opacity: 1;'>
