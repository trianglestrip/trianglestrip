                <g transform='translate(680.83333333333, 48)'>
                    <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#ff1493' stroke='none' font-family='"Segoe UI", Ubuntu, sans-serif' font-weight='700' font-size='28px' font-style='normal' style='opacity: 1; opacity: 1;'>
                        23
                    </text>
                </g>

                <!-- Longest Streak label -->
                <g transform='translate(680.83333333333, 84)'>
                    <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#ff1493' stroke='none' font-family='"Segoe UI", Ubuntu, sans-serif' font-weight='400' font-size='14px' font-style='normal' style='opacity: 1; opacity: 1;'>
