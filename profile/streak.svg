                    </text>
                </g>

                <!-- Total Contributions label -->
                <g transform='translate(136.16666666667, 84)'>
                    <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#ff1493' stroke='none' font-family='"Segoe UI", Ubuntu, sans-serif' font-weight='400' font-size='14px' font-style='normal' style='opacity: 1; opacity: 1;'>
                        合计贡献
                    </text>
                </g>

                <!-- Total Contributions range -->
                <g transform='translate(136.16666666667, 114)'>
                    <text x='0' y='32' stroke-width='0' text-anchor='middle' fill='#00e5ff' stroke='none' font-family='"Segoe UI", Ubuntu, sans-serif' font-weight='400' font-size='12px' font-style='normal' style='opacity: 1; opacity: 1;'>
