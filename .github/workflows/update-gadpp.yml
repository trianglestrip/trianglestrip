name: Update recent commits

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-gadpp.yml

jobs:
  gadpp:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update recent commits section
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER: ${{ github.repository_owner }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          marker = "<!-- START gadpp -->"


          def trunc_msg(message: str, limit: int = 72) -> str:
              line = message.split("\n")[0].strip()
              if len(line) <= limit:
                  return line
              return line[: limit - 1] + "…"


          def gh_get(url: str) -> dict | list:
              headers = {
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "trianglestrip-gadpp",
                  "Authorization": f"Bearer {token}",
              }
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.load(resp)


          with open("README.md", encoding="utf-8") as f:
              content = f.read()

          if marker not in content:
              raise SystemExit("GADPP marker not found in README.md")

          head, rest = content.split(marker, 1)
          tail = ""
          if "\n---\n" in rest:
              tail = rest[rest.index("\n---\n") :]
          head = head.rstrip() + "\n\n" + marker + "\n"

          token = os.environ["GITHUB_TOKEN"]
          user = os.environ["USER"]
          excluded = {
              f"{user}/{user}",
              f"{user}/{user}.github.io",
          }

          def skip_repo(repo: str) -> bool:
              return repo in excluded

          events = gh_get(
              f"https://api.github.com/users/{user}/events/public?per_page=30"
          )
          repos: list[str] = []
          seen: set[str] = set()
          for event in events:
              if event.get("type") != "PushEvent":
                  continue
              repo = event["repo"]["name"]
              if repo in seen or skip_repo(repo):
                  continue
              seen.add(repo)
              repos.append(repo)
              if len(repos) >= 3:
                  break

          if len(repos) < 3:
              for item in gh_get(
                  f"https://api.github.com/users/{user}/repos?sort=pushed&per_page=20"
              ):
                  full_name = item["full_name"]
                  if full_name in seen or skip_repo(full_name):
                      continue
                  seen.add(full_name)
                  repos.append(full_name)
                  if len(repos) >= 3:
                      break

          lines: list[str] = []
          for repo in repos[:3]:
              try:
                  commits = gh_get(
                      f"https://api.github.com/repos/{repo}/commits?per_page=2"
                  )
              except urllib.error.HTTPError as err:
                  if err.code in (409, 404):
                      continue
                  raise
              if not commits:
                  continue
              lines.append(f"**{repo}**")
              for commit in commits[:2]:
                  sha = commit["sha"]
                  short = sha[:7]
                  msg = trunc_msg(commit["commit"]["message"])
                  url = commit["html_url"]
                  lines.append(f"- {msg} · [{short}]({url})")
              lines.append("")

          while lines and lines[-1] == "":
              lines.pop()

          new_content = head + "\n".join(lines) + ("\n" if lines else "") + tail
          with open("README.md", "w", encoding="utf-8", newline="\n") as f:
              f.write(new_content)
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update recent commits section"
          git push
