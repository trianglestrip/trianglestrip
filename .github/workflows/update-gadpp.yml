name: Update recent commits

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-gadpp.yml

jobs:
  gadpp:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update recent commits section
        env:
          USER: ${{ github.repository_owner }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.request

          marker = "<!-- START gadpp -->"
          with open("README.md", encoding="utf-8") as f:
              content = f.read()

          if marker not in content:
              raise SystemExit("GADPP marker not found in README.md")

          head, _ = content.split(marker, 1)
          head = head.rstrip() + "\n\n" + marker + "\n"

          token = os.environ.get("GH_TOKEN", "")
          user = os.environ["USER"]
          url = f"https://api.github.com/users/{user}/events/public?per_page=30"
          headers = {
              "Accept": "application/vnd.github+json",
              "User-Agent": "trianglestrip-gadpp",
          }
          if token:
              headers["Authorization"] = f"Bearer {token}"

          req = urllib.request.Request(url, headers=headers)
          with urllib.request.urlopen(req) as resp:
              events = json.load(resp)

          lines = []
          seen = set()
          for event in events:
              if event.get("type") != "PushEvent":
                  continue
              repo = event["repo"]["name"]
              if repo in seen:
                  continue
              seen.add(repo)
              ref = event["payload"]["ref"].replace("refs/heads/", "")
              sha = event["payload"]["head"]
              short = sha[:7]
              lines.append(
                  f"- {repo}, [{ref}@{short}](https://github.com/{repo}/commit/{sha})"
              )
              if len(lines) >= 8:
                  break

          new_content = head + "\n".join(lines) + ("\n" if lines else "")
          with open("README.md", "w", encoding="utf-8", newline="\n") as f:
              f.write(new_content)
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update recent commits section"
          git push
