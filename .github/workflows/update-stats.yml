name: Update profile stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "profile/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare output directory
        run: mkdir -p profile

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: '{"username":"${{ github.repository_owner }}","show_icons":true,"theme":"transparent","bg_color":"00000000","title_color":"FF1493","text_color":"00E5FF","icon_color":"FFD700","ring_color":"FF1493","include_all_commits":true,"rank_icon":"percentile","locale":"cn","hide_title":true,"hide_border":true,"border_radius":4.5,"disable_animations":true,"show":"reviews,prs_merged,prs_merged_percentage,discussions_started,discussions_answered"}'
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: '{"username":"${{ github.repository_owner }}","layout":"compact","theme":"transparent","bg_color":"00000000","title_color":"FF1493","text_color":"00E5FF","hide_border":true,"langs_count":6,"hide_progress":false,"locale":"cn","hide_title":true,"card_width":350,"border_radius":4.5,"disable_animations":true}'
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak card
        uses: DenverCoder1/github-readme-streak-stats@v1.7.0
        with:
          options: user=${{ github.repository_owner }}&theme=transparent&locale=zh_Hans&hide_border=true&card_width=817&border_radius=4.5&disable_animations=true&background=00000000&fire=FF4500&ring=FF1493&currStreakNum=FFD700&sideNums=FF1493&currStreakLabel=FFD700&sideLabels=FF1493&dates=00E5FF&stroke=9D4EDD
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --staged --quiet || git commit -m "Update profile stats cards"
          git push
